# Reducimos a 1.5GB para dejarle espacio al compilador de Dart
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=256m -Dfile.encoding=UTF-8

# Desactivamos el "parallel" y "configureondemand" porque consumen mucha RAM al procesar varias cosas a la vez
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.caching=true

android.useAndroidX=true
android.enableJetifier=true